<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dutch Blitz Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <header id="game-header">
      <h1>Dutch Blitz</h1>
      <button id="start-game-btn">Start Game</button>
    </header>


    <main id="table">
      <!-- Central piles (4 stacks) -->
      <section id="central-piles">
        <h2>Central Piles</h2>
        <div class="pile-row">
          <div class="pile central-pile" data-pile="1"></div>
          <div class="pile central-pile" data-pile="2"></div>
          <div class="pile central-pile" data-pile="3"></div>
          <div class="pile central-pile" data-pile="4"></div>
        </div>
      </section>




      <section id="bots-area1">
        <h2>Bots</h2>
        <div class="bot" id="bot-1">
          <h3>Bot 1</h3>
          <div class="bot-top-row">
            <div class="pile-group">
              <h3>Blitz Pile</h3>
              <div class="pile bot-blitz"></div>
            </div>

            <div class="pile-group">
              <h3>Bot 1 - Post Piles</h3>
              <div class="pile-row">
                <div class="pile post-pile" data-post="1"></div>
                <div class="pile post-pile" data-post="2"></div>
                <div class="pile post-pile" data-post="3"></div>
              </div>
            </div>

            <div class="pile-group">
              <h3>Bot 1 - Wood Pile</h3>
              <div class="pile wood-pile" id="bot1-wood"></div>
            </div>
          </div>
        </div> <!-- End of Bot 1 -->
      </section>

      <!-- Player area -->
      <section id="player-area">
        <h2>Your Area</h2>


        <div id="player-top-row">
          <div class="pile-group">
            <h3>Blitz Pile</h3>
            <div class="pile blitz-pile" id="player-blitz"></div>
          </div>


          <div class="pile-group">
            <h3>Post Piles</h3>
            <div class="pile-row">
              <div class="pile post-pile" data-post="1"></div>
              <div class="pile post-pile" data-post="2"></div>
              <div class="pile post-pile" data-post="3"></div>
            </div>
          </div>


          <div class="pile-group">
            <h3>Wood Pile</h3>
            <div class="pile wood-pile" id="player-wood"></div>
          </div>
        </div>


        <div id="player-hand-row">
          <h3>Your Hand</h3>
          <div id="player-hand"></div>
        </div>
      </section>
