<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dutch Blitz Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <header id="game-header">
      <h1>Dutch Blitz</h1>
      <button id="start-game-btn">Start Game</button>
    </header>

    <main id="table">
      <!-- Central piles (1–10 stacks) -->
      <section id="central-piles">
        <h2>Central Piles</h2>
        <div class="pile-row">
          <div class="pile central-pile" data-pile="1"></div>
          <div class="pile central-pile" data-pile="2"></div>
          <div class="pile central-pile" data-pile="3"></div>
          <div class="pile central-pile" data-pile="4"></div>
          <div class="pile central-pile" data-pile="5"></div>
          <div class="pile central-pile" data-pile="6"></div>
          <div class="pile central-pile" data-pile="7"></div>
        </div>
        <div class="pile-row">
          <div class="pile central-pile" data-pile="8"></div>
          <div class="pile central-pile" data-pile="9"></div>
          <div class="pile central-pile" data-pile="10"></div>
          <div class="pile central-pile" data-pile="11"></div>
          <div class="pile central-pile" data-pile="12"></div>
          <div class="pile central-pile" data-pile="13"></div>
          <div class="pile central-pile" data-pile="14"></div>
        </div>
        <div class="pile-row">
          <div class="pile central-pile" data-pile="15"></div>
          <div class="pile central-pile" data-pile="16"></div>
          <div class="pile central-pile" data-pile="17"></div>
          <div class="pile central-pile" data-pile="18"></div>
          <div class="pile central-pile" data-pile="19"></div>
          <div class="pile central-pile" data-pile="20"></div>
          <div class="pile central-pile" data-pile="21"></div>
        </div>
        <!-- <div class="pile-row">
          <div class="pile central-pile" data-pile="22"></div>
          <div class="pile central-pile" data-pile="23"></div>
          <div class="pile central-pile" data-pile="24"></div>
          <div class="pile central-pile" data-pile="25"></div>
          <div class="pile central-pile" data-pile="20"></div>
        </div>  -->
      </section>

      <!-- Player area -->
      <section id="player-area">
        <h2>Your Area</h2>

        <div id="player-top-row">
          <div class="pile-group">
            <h3>Blitz Pile</h3>
            <div class="pile blitz-pile" id="player-blitz"></div>
          </div>

          <div class="pile-group">
            <h3>Post Piles</h3>
            <div class="pile-row">
              <div class="pile post-pile" data-post="1"></div>
              <div class="pile post-pile" data-post="2"></div>
              <div class="pile post-pile" data-post="3"></div>
            </div>
          </div>

          <div class="pile-group">
            <h3>Wood Pile</h3>
            <div class="pile wood-pile" id="player-wood"></div>
          </div>
        </div>

        <div id="player-hand-row">
          <h3>Your Hand</h3>
          <div id="player-hand"></div>
        </div>
      </section>

      <!-- Bot area placeholder -->
      <section id="bots-area">
        <h2>Bots</h2>
        <div class="bot" id="bot-1">
        <div class="bot" id="bot-1">
          <h3>Bot 1</h3>
          <div class="bot-top-row">
            <div class="pile-group">
              <h3>Blitz Pile</h3>
              <div class="pile bot-blitz"></div>
            </div>

            <div class="pile-group">
              <h3>Bot 1 - Post Piles</h3>
              <div class="pile-row">
                <div class="pile post-pile" data-post="1"></div>
                <div class="pile post-pile" data-post="2"></div>
                <div class="pile post-pile" data-post="3"></div>
              </div>
            </div>

            <div class="pile-group">
              <h3>Bot 1 -Wood Pile</h3>
              <div class="pile wood-pile" id="player-wood"></div>
            </div>
          </div>
        </div> <!-- End of Bot 1 -->
        </div> <!-- End of Bot 1 -->

        <div class="bot" id="bot-2">
          <h3>Bot 2</h3>
          <div class="bot-top-row">
            <div class="pile-group">
              <h3>Blitz Pile</h3>
              <div class="pile bot-blitz"></div>
            </div>

            <div class="pile-group">
              <h3>Bot 2 - Post Piles</h3>
              <div class="pile-row">
                <div class="pile post-pile" data-post="1"></div>
                <div class="pile post-pile" data-post="2"></div>
                <div class="pile post-pile" data-post="3"></div>
              </div>
            </div>

            <div class="pile-group">
              <h3>Bot 2 -Wood Pile</h3>
              <div class="pile wood-pile" id="player-wood"></div>
            </div>
          </div>
        </div> <!-- End of Bot 2 -->

        <div class="bot" id="bot-3">
          <h3>Bot 3</h3>
          <div class="bot-top-row">
            <div class="pile-group">
              <h3>Blitz Pile</h3>
              <div class="pile bot-blitz"></div>
            </div>

            <div class="pile-group">
              <h3>Bot 3 - Post Piles</h3>
              <div class="pile-row">
                <div class="pile post-pile" data-post="1"></div>
                <div class="pile post-pile" data-post="2"></div>
                <div class="pile post-pile" data-post="3"></div>
              </div>
            </div>

            <div class="pile-group">
              <h3>Bot 3 -Wood Pile</h3>
              <div class="pile wood-pile" id="player-wood"></div>
            </div>
          </div>
        </div> <!-- End of Bot 3 -->

      </section>
    </main>
  </div>

  <!-- Your JS will go here later -->
  <script src="script.js"></script>
</body>
</html>
